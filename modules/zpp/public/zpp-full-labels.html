<!DOCTYPE html>
<html>
<head>
  <title>Servidor Zebras</title>
  <link rel="icon" type="image/x-icon" href="zebra-logo.jpg">
  <style>
    :root {
        --backgroundC: rgb(216, 216, 216);
    }

    body {
        margin: 10px 250px;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
    }

    header {
        display: flex;
        justify-content: space-between;
        align-items: center;
    }
    header a {
        transition: 0.2s;
        text-decoration: none;
        color: black;
    }
    header a:hover {
        scale: 1.2;
        transition: 0.2s;
    }
    header a:hover #iconHome {
        filter: drop-shadow(0 0 6px rgba(129, 129, 129, 0.432));
    }
    .divTitle {
        display: flex;
        flex-direction: row;
        align-items: center;
        justify-content: center;
    }
    strong {
        color: red;
        font-size: 45px;
        text-align: left;
    }
    .divForm {
        display: flex;
        flex-direction: row;
        align-items: center;
        justify-content: center;
    }
    form {
        display: flex;
        align-items: center;
        gap: 50px;
    }
    .inputFile::file-selector-button {
        height: 62px;
        width: 250px;
        border-radius: 20px;
        border: 0px;
        background-color: rgb(210, 224, 157);
        font-size: 18px;
        font-weight: 700;
    }
    #status {
        margin-left: 10px;
        font-weight: 700;
    }
    #divFila {
        background-color: rgb(238, 134, 134);
        border-radius: 25px;
        padding: 10px 20px;
        margin-bottom: 8px;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }
    #divFila h2 {
        margin: 0px 0px 0px 6px;
    }
    .cleanList {
        border-radius: 13px;
        border: 0;
        padding: 5px 10px;
        margin-right: -5px;
        background-color: rgb(180, 60, 60);
        color: white;
    }
    .cleanList:hover {
        scale: 1.4;
        transition: 0.3s;
        font-size: 12px;
        background-color: rgb(114, 41, 41);
        color: white;
        margin-right: 3px;
    }
    #list div div {
        display: flex;
        align-items: center;
        justify-content: start;
        gap: 5px;
    }
    .buttonPrint {
        border-radius: 5px;
        border: 0px;
        background-color: var(--backgroundC);
        transition: 0.2s;
    }
    .buttonPrint:hover {
        scale: 1.1;
        transition: 0.2s;
        font-weight: 500;
        color: rgb(255, 255, 255);
        background-color: rgb(105, 129, 98);
    }
    hr {
        margin: 10 0;
    }
  </style>
</head>
<body>
    <header>
        <a id="aHome" href="/"><img id="iconHome" src="/icons/home.svg" alt=""></a>
        <div class="divTitle">
            <h2 class="h2Title">Enviar ZIP </h2>
            <strong>FULL</strong>
        </div>
        <div class="divForm">
            <form id="uploadForm">
            <input class="inputFile" type="file" name="file" required />
            </form>
            <p id="status"></p>
        </div>
    </header>

    <hr>

    <div id="divFila">
        <h2>Fila de Impressão</h2>
        <button class="cleanList" style="transition: 0.3s;" onclick="limparPasta()">Limpar</button>
    </div>

    <div id="list"></div>

    <script>
    async function loadQueueFull() {
    const res = await fetch("/zpp/queueFull");
    const data = await res.json();

    const div = document.getElementById("list");
    div.innerHTML = "";

    if (data.length === 0) {
        div.innerHTML = "<p>Fila vazia</p>";
        return;
    }

    data.forEach(item => {
        const el = document.createElement("div");

        el.innerHTML = `
        <div>
            <button class="buttonPrint" onclick="printItemFull('${item.id}')">Imprimir</button>
            <b class="bPrint">${item.name}</b>
        </div>
        <hr>
        `;

        div.appendChild(el);
    });
    }

    async function printItemFull(id) {
    const res = await fetch("/zpp/printFull/" + id, { method: "POST" });

    if (res.ok) {
        loadQueueFull();
    } else {
        alert("Erro ao imprimir");
    }
    }

    async function limparPasta() {
        const res = await fetch("/zpp/clearFull", { method: "POST" });

        if (res.ok) {
            loadQueueFull();
        } else {
            alert("Erro ao limpar");
        }
    }

    document.querySelector(".inputFile").addEventListener("change", async (e) => {
    const input = e.target;

    if (!input.files.length) return;

    const formData = new FormData();
    formData.append("file", input.files[0]);

    document.getElementById("status").innerText = "Enviando...";

    const res = await fetch("/zpp/uploadFull", {
        method: "POST",
        body: formData
    });

    if (res.ok) {
        document.getElementById("status").innerText = "Enviado com sucesso";
        input.value = ""; // limpa input
        loadQueueFull();
    } else {
        document.getElementById("status").innerText = "Erro no envio";
    }
    });

    // auto reload da fila a cada 5s
    setInterval(loadQueueFull, 5000);

    loadQueueFull();
    </script>

</body>
</html>
